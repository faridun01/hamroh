name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web prototype
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore backend/Hamroh.Api/Hamroh.Api.csproj
      - run: dotnet build backend/Hamroh.Api/Hamroh.Api.csproj --configuration Release --no-restore
      - run: dotnet test backend/Hamroh.Api.Tests/Hamroh.Api.Tests.csproj --configuration Release

  mobile:
    name: Flutter static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: mobile
        run: flutter pub get
      - working-directory: mobile
        run: flutter analyze
      - working-directory: mobile
        run: flutter test
