services:
  postgres:
    image: postgres:16-alpine
    container_name: hamroh-postgres
    environment:
      POSTGRES_DB: hamroh
      POSTGRES_USER: hamroh
      POSTGRES_PASSWORD: hamroh_dev_password
    ports:
      - "5432:5432"
    volumes:
      - hamroh_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hamroh -d hamroh"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hamroh-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - hamroh_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/Hamroh.Api
    container_name: hamroh-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=hamroh;Username=hamroh;Password=hamroh_dev_password;Pooling=true;Maximum Pool Size=100
      ConnectionStrings__Redis: redis:6379
      Jwt__Issuer: Hamroh
      Jwt__Audience: HamrohMobile
      Jwt__Secret: CHANGE_ME_USE_SECRET_MANAGER_IN_PRODUCTION_32_CHARS_MINIMUM
    ports:
      - "8080:8080"

volumes:
  hamroh_postgres:
  hamroh_redis:
