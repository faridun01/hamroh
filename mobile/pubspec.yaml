name: hamroh_mobile
description: Production mobile app for Hamroh intercity ride-sharing.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^6.1.0
  dio: ^5.7.0
  firebase_analytics: ^11.3.6
  firebase_core: ^3.8.1
  firebase_crashlytics: ^4.1.6
  firebase_messaging: ^15.1.6
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  geolocator: ^13.0.2
  go_router: ^14.6.2
  intl: ^0.20.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  freezed: ^2.5.7
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
